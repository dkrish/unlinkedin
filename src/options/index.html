<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnLinkedIn — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px; color: #111827; background: #f9fafb;
      min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px;
    }
    .container {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 28px 32px 32px; width: 100%; max-width: 480px; height: fit-content;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
    .header h1 { font-size: 18px; font-weight: 700; color: #7c3aed; }
    .header p { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .field { margin-bottom: 16px; }
    label {
      display: block; font-size: 12px; font-weight: 600; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    input[type="password"], select {
      width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 7px;
      font-size: 14px; font-family: inherit; color: #111827; background: #fff;
    }
    input:focus, select:focus {
      outline: none; border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.12);
    }
    .hint { font-size: 12px; color: #9ca3af; margin-top: 5px; }
    .actions { display: flex; align-items: center; gap: 12px; margin-top: 22px; }
    .btn-save {
      padding: 9px 22px; background: #7c3aed; color: #fff; border: none; border-radius: 7px;
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-save:hover { background: #6d28d9; }
    .btn-save:disabled { opacity: 0.55; cursor: not-allowed; }
    #status-msg { font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div><h1>✦ UnLinkedIn</h1><p>LinkedIn comedian commentary &amp; TLDR</p></div>
    </div>
    <form id="settings-form" novalidate>
      <div class="field">
        <label for="api-key">OpenRouter API Key</label>
        <input type="password" id="api-key" placeholder="sk-or-..." autocomplete="off" spellcheck="false">
        <p class="hint">Stored locally on this device only. Get one at openrouter.ai</p>
      </div>
      <div class="field">
        <label for="post-mode">Mode</label>
        <select id="post-mode">
          <option value="roast" selected>Roast — comedian commentary on the post</option>
          <option value="tldr">TLDR — plain, jargon-free summary</option>
        </select>
      </div>
      <div id="roast-settings">
        <div class="field">
          <label for="humor-mode">Humor Mode</label>
          <select id="humor-mode">
            <option value="dry">Dry — deadpan and resigned</option>
            <option value="funny">Funny — playful, self-aware</option>
            <option value="savage-lite" selected>Savage-lite — sharp, roasty, not cruel</option>
          </select>
        </div>
        <div class="field">
          <label for="translation-style">Translation Style</label>
          <select id="translation-style">
            <option value="politely">Politely — charitable but plain</option>
            <option value="honestly">Honestly — say the quiet part loud</option>
            <option value="group-chat" selected>Group chat — riff on it with friends</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="output-length">Output Length</label>
        <select id="output-length">
          <option value="one-liner">One-liner</option>
          <option value="short" selected>Short (2–4 sentences)</option>
          <option value="full">Full</option>
        </select>
      </div>
      <div class="actions">
        <button type="submit" class="btn-save" id="save-btn">Save settings</button>
        <span id="status-msg" aria-live="polite"></span>
      </div>
    </form>
  </div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
