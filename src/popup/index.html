<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnLinkedIn</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #111827;
      background: #fff;
      width: 300px;
      padding: 18px 20px 20px;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #7c3aed; }
    .field { margin-bottom: 13px; }
    label {
      display: block; font-size: 11px; font-weight: 600; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px;
    }
    input[type="password"], select {
      width: 100%; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 13px; font-family: inherit; color: #111827; background: #fff; appearance: auto;
    }
    input:focus, select:focus {
      outline: none; border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.12);
    }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 4px; }
    .actions { display: flex; align-items: center; gap: 10px; margin-top: 16px; }
    .btn-save {
      padding: 7px 18px; background: #7c3aed; color: #fff; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-save:hover { background: #6d28d9; }
    .btn-save:disabled { opacity: 0.55; cursor: not-allowed; }
    #status-msg { font-size: 12px; }
  </style>
</head>
<body>
  <div class="header"><span aria-hidden="true">✦</span><h1>UnLinkedIn</h1></div>
  <form id="settings-form" novalidate>
    <div class="field">
      <label for="api-key">OpenRouter API Key</label>
      <input type="password" id="api-key" placeholder="sk-or-..." autocomplete="off" spellcheck="false">
      <p class="hint">Stored locally on this device only.</p>
    </div>
    <div class="field">
      <label for="humor-mode">Humor Mode</label>
      <select id="humor-mode">
        <option value="dry">Dry</option>
        <option value="funny" selected>Funny</option>
        <option value="savage-lite">Savage-lite</option>
      </select>
    </div>
    <div class="field">
      <label for="translation-style">Translation Style</label>
      <select id="translation-style">
        <option value="politely">Translate politely</option>
        <option value="honestly" selected>Translate honestly</option>
        <option value="group-chat">Translate like your group chat</option>
      </select>
    </div>
    <div class="field">
      <label for="output-length">Output Length</label>
      <select id="output-length">
        <option value="one-liner">One-liner</option>
        <option value="short" selected>Short rewrite</option>
        <option value="full">Full translation</option>
      </select>
    </div>
    <div class="actions">
      <button type="submit" class="btn-save" id="save-btn">Save</button>
      <span id="status-msg" aria-live="polite"></span>
    </div>
  </form>
  <script type="module" src="./index.ts"></script>
</body>
</html>
